# Docs: https://github.com/Azure/webapps-deploy
name: Deploy Next.js to Azure Web App - taktiq-web-frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build @gymhero/web (Next standalone)
        run: pnpm --filter @gymhero/web run build
        working-directory: frontend

      - name: Prepare Next standalone artifact
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="$GITHUB_WORKSPACE/frontend/apps/web"
          STANDALONE_DIR="$APP_DIR/.next/standalone"
          DEPLOY_DIR="$APP_DIR/out-azure"

          if [ ! -d "$STANDALONE_DIR" ]; then
            echo "ERROR: Standalone build not found at $STANDALONE_DIR" >&2
            exit 1
          fi

          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          # Copia o standalone inteiro
          cp -a "$STANDALONE_DIR/." "$DEPLOY_DIR/"

          # Garante BUILD_ID no .next do app
          if [ -f "$APP_DIR/.next/BUILD_ID" ]; then
            BUILD_ID_VAL="$(cat "$APP_DIR/.next/BUILD_ID" || true)"
          else
            echo "WARN: .next/BUILD_ID não encontrado; gerando um novo..."
            BUILD_ID_VAL="$(date +%s%N | md5sum | cut -c1-20)"
            mkdir -p "$APP_DIR/.next"
            echo "$BUILD_ID_VAL" > "$APP_DIR/.next/BUILD_ID"
          fi
          mkdir -p "$DEPLOY_DIR/frontend/apps/web/.next"
          echo "$BUILD_ID_VAL" > "$DEPLOY_DIR/frontend/apps/web/.next/BUILD_ID"

          # Copia static e manifests para o .next do app
          if [ -d "$APP_DIR/.next/static" ]; then
            mkdir -p "$DEPLOY_DIR/frontend/apps/web/.next/static"
            cp -a "$APP_DIR/.next/static/." "$DEPLOY_DIR/frontend/apps/web/.next/static/"
          fi
          for f in routes-manifest.json prerender-manifest.json app-build-manifest.json build-manifest.json required-server-files.json; do
            if [ -f "$APP_DIR/.next/$f" ]; then
              cp "$APP_DIR/.next/$f" "$DEPLOY_DIR/frontend/apps/web/.next/$f"
            fi
          done

          # Copia public (se existir)
          if [ -d "$APP_DIR/public" ]; then
            mkdir -p "$DEPLOY_DIR/frontend/apps/web/public"
            cp -a "$APP_DIR/public/." "$DEPLOY_DIR/frontend/apps/web/public/"
          fi

          echo "== Sanity check =="
          test -f "$DEPLOY_DIR/frontend/apps/web/.next/BUILD_ID" || { echo "ERROR: BUILD_ID faltando em frontend/apps/web/.next/BUILD_ID"; exit 1; }
          echo "BUILD_ID=$(cat "$DEPLOY_DIR/frontend/apps/web/.next/BUILD_ID")"
          echo "=== Final artifact tree (first 200 lines) ==="
          ls -laR "$DEPLOY_DIR" | sed -n '1,200p'


      - name: Create ZIP artifact
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/frontend/apps/web"
          rm -f out-azure.zip
          # zip -r preserva diretórios ocultos (.next)
          zip -r out-azure.zip out-azure
          echo "== ZIP content (first 200) =="
          unzip -l out-azure.zip | sed -n '1,200p'
          echo "== Check BUILD_ID inside ZIP =="
          unzip -l out-azure.zip | grep -E "/\.next/BUILD_ID$" || (echo "BUILD_ID not in ZIP!" >&2; exit 1)

      - name: Upload artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: node-app-zip
          path: frontend/apps/web/out-azure.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact (ZIP)
        uses: actions/download-artifact@v4
        with:
          name: node-app-zip
          path: .

      - name: Debug artifact tree & verify server.js and BUILD_ID
        shell: bash
        run: |
          echo "== Tree of node-app (first 200 lines) =="
          ls -laR node-app | sed -n '1,200p'

          echo "== Locate server.js (standalone) =="
          SERVER_PATH=$( /usr/bin/find node-app -maxdepth 30 -path '*/.next/standalone/*/server.js' | head -n1 || true )
          if [ -z "${SERVER_PATH:-}" ]; then
            echo "ERROR: standalone server.js NOT FOUND in node-app" >&2
            exit 1
          fi
          echo "server.js at: ${SERVER_PATH#node-app/}"

          echo "== Verify BUILD_ID in app .next =="
          if [ ! -f "node-app/frontend/apps/web/.next/BUILD_ID" ]; then
            echo "ERROR: BUILD_ID missing at node-app/frontend/apps/web/.next/BUILD_ID" >&2
            exit 1
          fi
          echo "BUILD_ID present."

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEE9156CBCEE42579E234674CAED3201 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA773EF948164EB4B840B38206C0EE9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2670BF870A264746887AD5A7A625FC08 }}

      - name: Deploy to Azure Web App (ZIP)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taktiq-web-frontend'
          slot-name: 'Production'
          package: out-azure.zip
          startup-command: 'node frontend/apps/web/.next/standalone/frontend/apps/web/server.js'
'


# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - taktiq-web-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 

    steps:
      - uses: actions/checkout@v4
      
      # 1. Instalar o pnpm no ambiente
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4 # A versão do seu lockfile

      # 2. Configurar o Node.js com cache do pnpm
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'pnpm' # Usar cache do pnpm
          cache-dependency-path: 'frontend/pnpm-lock.yaml' # Caminho correto para o lockfile

      # 3. COMANDOS DE INSTALAÇÃO E BUILD CORRIGIDOS
      - name: Install Dependencies and Build Frontend
        run: |
          # 1. Navega para a raiz do seu frontend
          cd frontend
          
          # 2. Instala todas as dependências do monorepo
          pnpm install --frozen-lockfile
          
          # 3. Executa o build da sua aplicação web (Next.js)
          # Isso gera a pasta .next/standalone
          pnpm run build:web

      # 4. Upload artifact for deployment job
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # O ARTEFACTO CORRETO é a pasta 'standalone'
          path: frontend/apps/web/.next/standalone 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read 

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: . # Descarrega para o diretório atual
      
      # O login e o deploy continuam iguais
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEE9156CBCEE42579E234674CAED3201 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA773EF948164EB4B840B38206C0EE9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2670BF870A264746887AD5A7A625FC08 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taktiq-web-frontend'
          slot-name: 'Production'
          # Aponta para a raiz do artefato descarregado
          package: . 
          # Comando de arranque (Next.js Standalone)
          startup-command: "node apps/web/server.js"
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - taktiq-web-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 

    steps:
      - uses: actions/checkout@v4
      
      # 1. Setup Node.js (sem cache pnpm, para simplificar)
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # 2. Instalação e Build (usando o contexto da pasta frontend)
      - name: Install Dependencies and Build Frontend
        # Define o diretório de trabalho para 'frontend'
        working-directory: frontend 
        run: |
          # Usamos o NPM padrão, que o ambiente da Azure entende melhor
          npm install
          
          # Entramos na pasta da aplicação web para o build
          cd apps/web
          npm run build

      # 3. Upload artifact for deployment job
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # O caminho do artefato é a raiz da app 'web' com os ficheiros compilados
          path: frontend/apps/web/.next/standalone # O Next.js Standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read 

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: . 
      
      # O login já deve ter sido configurado pela Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEE9156CBCEE42579E234674CAED3201 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA773EF948164EB4B840B38206C0EE9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2670BF870A264746887AD5A7A625FC08 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taktiq-web-frontend'
          slot-name: 'Production'
          # Aponta para a raiz do artefato descarregado
          package: . 
          # Comando de arranque (Next.js Standalone)
          startup-command: "node apps/web/server.js"
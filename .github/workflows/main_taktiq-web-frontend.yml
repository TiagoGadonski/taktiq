name: Deploy Next.js to Azure Web App - taktiq-web-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 

    steps:
      - uses: actions/checkout@v4
      
      # 1. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # --- INSTALAÇÃO E BUILD CORRIGIDOS ---
      - name: Install Dependencies and Build Frontend
        # Executa na pasta raiz do frontend para resolver dependências
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          
          # Executa o build da aplicação web (dentro da pasta web)
          cd apps/web
          pnpm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/apps/web/.next/standalone 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: . 
      
      # O login já deve ter sido configurado pela Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEE9156CBCEE42579E234674CAED3201 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA773EF948164EB4B840B38206C0EE9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2670BF870A264746887AD5A7A625FC08 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taktiq-web-frontend'
          slot-name: 'Production'
          # Aponta para a raiz do artefato descarregado
          package: . 
          # Comando de arranque (Next.js Standalone)
          startup-command: "node apps/web/server.js"
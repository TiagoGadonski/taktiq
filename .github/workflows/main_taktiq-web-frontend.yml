# Docs: https://github.com/Azure/webapps-deploy
name: Deploy Next.js to Azure Web App - taktiq-web-frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      # instala as dependências do monorepo (onde está o pnpm-workspace.yaml)
      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # build do app Next em modo standalone
      - name: Build @gymhero/web (Next standalone)
        run: pnpm --filter @gymhero/web run build
        working-directory: frontend

      # prepara artefato: standalone + .next/static + BUILD_ID + public
      - name: Prepare Next standalone artifact
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="$GITHUB_WORKSPACE/frontend/apps/web"
          STANDALONE_DIR="$APP_DIR/.next/standalone"
          DEPLOY_DIR="$APP_DIR/out-azure"

          if [ ! -d "$STANDALONE_DIR" ]; then
            echo "Standalone build output not found at $STANDALONE_DIR" >&2
            exit 1
          fi

          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          # 1) copia tudo do standalone (inclui árvore “replicada” do monorepo)
          cp -a "$STANDALONE_DIR/." "$DEPLOY_DIR/"

          # 2) localizar o server.js dentro do standalone (ex.: frontend/apps/web/server.js)
          SERVER_PATH=$(cd "$DEPLOY_DIR" && /usr/bin/find . -maxdepth 8 -path '*/server.js' | head -n1 || true)
          if [ -z "${SERVER_PATH:-}" ]; then
            echo "server.js NOT FOUND inside $DEPLOY_DIR" >&2
            ls -laR "$DEPLOY_DIR" | sed -n '1,200p' >&2
            exit 1
          fi
          echo "Found server.js at: $SERVER_PATH"
          APP_RUNTIME_DIR="$(dirname "$SERVER_PATH")"
          APP_RUNTIME_DIR="${APP_RUNTIME_DIR#./}"  # remove prefixo './'

          # 3) assets estáticos do Next ao lado do server.js
          mkdir -p "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next"
          cp -a "$APP_DIR/.next/static" "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next/static"

          # 4) BUILD_ID é obrigatório para start em produção
          if [ -f "$APP_DIR/.next/BUILD_ID" ]; then
            cp "$APP_DIR/.next/BUILD_ID" "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next/BUILD_ID"
          else
            echo "WARN: BUILD_ID not found at $APP_DIR/.next/BUILD_ID" >&2
          fi

          # 5) manifests (opcional, mas ajuda em alguns cenários)
          for f in "routes-manifest.json" "prerender-manifest.json" "app-build-manifest.json"; do
            if [ -f "$APP_DIR/.next/$f" ]; then
              cp "$APP_DIR/.next/$f" "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next/$f"
            fi
          done

          # 6) pasta public (se existir)
          if [ -d "$APP_DIR/public" ]; then
            cp -a "$APP_DIR/public" "$DEPLOY_DIR/$APP_RUNTIME_DIR/public"
          fi

          echo "=== Final artifact tree (first 200 lines) ==="
          ls -laR "$DEPLOY_DIR" | sed -n '1,200p'

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/apps/web/out-azure

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: node-app

      - name: Debug artifact tree & verify server.js
        shell: bash
        run: |
          echo "== Tree of node-app (first 200 lines) =="
          ls -laR node-app | sed -n '1,200p'
          echo "== Look for server.js =="
          cd node-app
          SERVER_PATH=$( /usr/bin/find . -maxdepth 8 -path '*/server.js' | head -n1 || true )
          if [ -z "${SERVER_PATH:-}" ]; then
            echo "server.js NOT FOUND in node-app" >&2
            exit 1
          fi
          echo "server.js at: $SERVER_PATH"
          echo "APP_RUNTIME_DIR=${SERVER_PATH%/server.js}" >> $GITHUB_ENV
          echo "SERVER_PATH=${SERVER_PATH#./}" >> $GITHUB_ENV

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEE9156CBCEE42579E234674CAED3201 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA773EF948164EB4B840B38206C0EE9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2670BF870A264746887AD5A7A625FC08 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taktiq-web-frontend'
          slot-name: 'Production'
          package: node-app
          startup-command: 'bash -c "cd ${{ env.APP_RUNTIME_DIR#./ }} && HOST=0.0.0.0 PORT=${PORT:-8080} node server.js"'

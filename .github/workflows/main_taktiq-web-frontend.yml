# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Deploy Next.js to Azure Web App - taktiq-web-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 

    steps:
      - uses: actions/checkout@v4
      
      # 1. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # --- INSTALAÇÃO E BUILD CORRIGIDOS (Sem TURBO) ---

      # 2. Instalar todas as dependências (na raiz do frontend)
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # 3. Construir o projeto web (O Passo Mais Importante)
      - name: Build Web App
        run: |
          # Executa o build que irá ler o next.config.js (com o webpack alias)
          pnpm run build
        working-directory: frontend/apps/web 
        env:
          # Adicione o Node Environment para garantir o build de produção
          NODE_ENV: production
      
      # 4. Upload artifact for deployment job
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # O caminho do artefato é a pasta de build Next.js
          path: frontend/apps/web/.next/standalone 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read 

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: . 
      
      # (Login e Deploy continuam iguais)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEE9156CBCEE42579E234674CAED3201 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA773EF948164EB4B840B38206C0EE9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2670BF870A264746887AD5A7A625FC08 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taktiq-web-frontend'
          slot-name: 'Production'
          package: . 
          startup-command: "node apps/web/server.js"
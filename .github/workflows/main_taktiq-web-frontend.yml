# Docs: https://github.com/Azure/webapps-deploy
name: Deploy Next.js to Azure Web App - taktiq-web-frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Instala as dependências do monorepo (onde está o pnpm-workspace.yaml)
      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # Build do app Next (SSR) já em modo standalone
      - name: Build @gymhero/web (Next standalone)
        run: pnpm --filter @gymhero/web run build
        working-directory: frontend

      # Prepara artefato standalone: server.js + deps mínimas + .next/static + public
      - name: Prepare Next standalone artifact
        run: |
          set -euo pipefail
          APP_DIR="$GITHUB_WORKSPACE/frontend/apps/web"
          STANDALONE_DIR="$APP_DIR/.next/standalone"
          DEPLOY_DIR="$APP_DIR/out-azure"

          if [ ! -d "$STANDALONE_DIR" ]; then
            echo "Standalone build output not found at $STANDALONE_DIR" >&2
            exit 1
          fi

          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          # 1) copia tudo do standalone
          cp -a "$STANDALONE_DIR/." "$DEPLOY_DIR/"

          # 2) assets estáticos no caminho esperado
          mkdir -p "$DEPLOY_DIR/.next"
          cp -a "$APP_DIR/.next/static" "$DEPLOY_DIR/.next/static"

          # 3) public (se existir)
          if [ -d "$APP_DIR/public" ]; then
            cp -a "$APP_DIR/public" "$DEPLOY_DIR/public"
          fi

          echo "=== Conteúdo do deploy dir ==="
          ls -la "$DEPLOY_DIR" || true
          echo "=== Procura server.js ==="
          (cd "$DEPLOY_DIR" && ( [ -f server.js ] && echo "Found: server.js at root" || ( [ -f apps/web/server.js ] && echo "Found: apps/web/server.js" || echo "server.js NOT FOUND" ) ) )

      # Sobe o artefato (pasta) para ser usado no job de deploy
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/apps/web/out-azure

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: node-app            # baixa em ./node-app

      - name: List artifact tree (debug)
        run: |
          echo "== Tree of node-app =="
          ls -la node-app
          echo "== Look for server.js =="
          (cd node-app && ( [ -f server.js ] && echo "Found: server.js at root" || ( [ -f apps/web/server.js ] && echo "Found: apps/web/server.js" || (echo "server.js NOT FOUND" && exit 1) ) ) )

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEE9156CBCEE42579E234674CAED3201 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA773EF948164EB4B840B38206C0EE9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2670BF870A264746887AD5A7A625FC08 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taktiq-web-frontend'
          slot-name: 'Production'
          package: node-app
          # 👇 Se o passo de "List artifact" mostrou server.js na raiz, mude para "node server.js".
          # Em monorepo, é comum vir como apps/web/server.js:
          startup-command: 'node apps/web/server.js'

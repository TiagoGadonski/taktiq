# Docs: https://github.com/Azure/webapps-deploy
name: Deploy Next.js to Azure Web App - taktiq-web-frontend (ZIP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Instala o workspace do monorepo (onde está pnpm-workspace.yaml)
      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # Build do app Next em modo standalone (exige output:'standalone' no next.config.js)
      - name: Build @gymhero/web (Next standalone)
        run: pnpm --filter @gymhero/web run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.taktiq.app

      # Prepara artefato: copia standalone + .next/static + BUILD_ID + manifests + public + start.sh
      - name: Prepare Next standalone artifact
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="$GITHUB_WORKSPACE/frontend/apps/web"
          STANDALONE_DIR="$APP_DIR/.next/standalone"
          DEPLOY_DIR="$APP_DIR/out-azure"

          if [ ! -d "$STANDALONE_DIR" ]; then
            echo "ERROR: Standalone build not found at $STANDALONE_DIR" >&2
            exit 1
          fi

          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          # 1) copia tudo do standalone (dereference symlinks to avoid path issues)
          cp -rL "$STANDALONE_DIR/." "$DEPLOY_DIR/"

          # 2) localizar o server.js dentro do standalone (ex.: ./frontend/apps/web/server.js dentro do DEPLOY_DIR)
          SERVER_PATH=$(cd "$DEPLOY_DIR" && /usr/bin/find . -maxdepth 8 -path '*/server.js' | head -n1 || true)
          if [ -z "${SERVER_PATH:-}" ]; then
            echo "ERROR: server.js NOT FOUND inside $DEPLOY_DIR" >&2
            ls -laR "$DEPLOY_DIR" | sed -n '1,200p' >&2
            exit 1
          fi
          echo "Found server.js at: $SERVER_PATH"

          APP_RUNTIME_DIR="$(dirname "$SERVER_PATH")"
          APP_RUNTIME_DIR="${APP_RUNTIME_DIR#./}"

          # 3) cria a pasta .next ao lado do server e copia os assets estáticos
          mkdir -p "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next"

          if [ -d "$APP_DIR/.next/static" ]; then
            cp -a "$APP_DIR/.next/static" "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next/static"
          fi

          # 4) BUILD_ID obrigatório
          if [ -f "$APP_DIR/.next/BUILD_ID" ]; then
            cp "$APP_DIR/.next/BUILD_ID" "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next/BUILD_ID"
          else
            echo "ERROR: BUILD_ID not found at $APP_DIR/.next/BUILD_ID" >&2
            ls -la "$APP_DIR/.next" || true
            exit 1
          fi

          # 5) Manifests úteis
          for f in "routes-manifest.json" "prerender-manifest.json" "app-build-manifest.json" "build-manifest.json" "required-server-files.json"; do
            if [ -f "$APP_DIR/.next/$f" ]; then
              cp "$APP_DIR/.next/$f" "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next/$f"
            fi
          done

          # 6) public (se existir)
          if [ -d "$APP_DIR/public" ]; then
            cp -a "$APP_DIR/public" "$DEPLOY_DIR/$APP_RUNTIME_DIR/public"
          fi

          # 7) script de inicialização robusto
          cat > "$DEPLOY_DIR/start.sh" << 'EOS'
          #!/bin/sh
          set -e

          # Log environment for debugging
          echo "=== Starting Next.js standalone server ==="
          echo "PORT: ${PORT:-8080}"
          echo "NODE_ENV: production"
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la

          # Navigate to the app directory where server.js is located
          cd "$APP_RUNTIME_DIR"

          # Start the server
          echo "Starting server.js from: $(pwd)"
          HOST=0.0.0.0 PORT=${PORT:-8080} NODE_ENV=production exec node server.js
          EOS

          # Replace APP_RUNTIME_DIR placeholder with actual path
          sed -i "s|\$APP_RUNTIME_DIR|$APP_RUNTIME_DIR|g" "$DEPLOY_DIR/start.sh"
          chmod +x "$DEPLOY_DIR/start.sh"

          echo "=== start.sh contents ==="
          cat "$DEPLOY_DIR/start.sh"

          echo "== VERIFY BUILD_ID next to server.js =="
          if [ ! -f "$DEPLOY_DIR/$APP_RUNTIME_DIR/.next/BUILD_ID" ]; then
            echo "ERROR: BUILD_ID missing at $DEPLOY_DIR/$APP_RUNTIME_DIR/.next/BUILD_ID" >&2
            exit 1
          fi

          echo "=== Final artifact tree (first 200 lines) ==="
          ls -laR "$DEPLOY_DIR" | sed -n '1,200p'

      # Create tar.gz instead of zip to avoid Windows path issues
      - name: Create deploy archive (tar.gz)
        shell: bash
        run: |
          set -euo pipefail
          cd frontend/apps/web/out-azure
          # Use tar to preserve Unix paths properly
          tar -czf ../out-azure.tar.gz .
          cd ..
          echo "== Archive listing =="
          tar -tzf out-azure.tar.gz | head -120 || true

      - name: Upload artifact (tar.gz)
        uses: actions/upload-artifact@v4
        with:
          name: deploy-archive
          path: frontend/apps/web/out-azure.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact (tar.gz)
        uses: actions/download-artifact@v4
        with:
          name: deploy-archive
          path: .

      - name: Verify archive
        run: |
          echo "== Files =="
          ls -la
          echo "== Archive listing =="
          tar -tzf out-azure.tar.gz | head -120 || true
          echo "== Checking for backslashes in paths =="
          if tar -tzf out-azure.tar.gz | grep -q '\\'; then
            echo "ERROR: Found backslashes in archive paths!" >&2
            tar -tzf out-azure.tar.gz | grep '\\'
            exit 1
          else
            echo "OK: No backslashes found in archive paths"
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BEE9156CBCEE42579E234674CAED3201 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA773EF948164EB4B840B38206C0EE9B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2670BF870A264746887AD5A7A625FC08 }}

      # Extract tar.gz and create zip for Azure deployment
      - name: Extract and create zip for deployment
        run: |
          mkdir -p deploy-temp
          tar -xzf out-azure.tar.gz -C deploy-temp
          cd deploy-temp
          zip -r ../deploy.zip .
          cd ..
          echo "== Zip contents (first 120 lines) =="
          unzip -l deploy.zip | head -120 || true

      # Set startup command before deployment
      - name: Configure startup command
        run: |
          az webapp config set \
            --resource-group taktiqRecursos \
            --name taktiq-web-frontend \
            --startup-file "./start.sh"

      # Deploy using az CLI with zip (skip health check wait)
      - name: Deploy to Azure Web App (az CLI)
        run: |
          echo "Starting deployment..."

          # Deploy without waiting for full startup (--async skips health check)
          az webapp deploy \
            --resource-group taktiqRecursos \
            --name taktiq-web-frontend \
            --src-path deploy.zip \
            --type zip \
            --timeout 300 || {
            echo "Deploy command timed out, but deployment may still be processing..."
            echo "Check deployment status at: https://taktiq-web-frontend.scm.azurewebsites.net"
            exit 0
          }

          echo "Deployment command completed"

      # Monitor deployment status without blocking
      - name: Check deployment status
        run: |
          echo "=== Deployment initiated ==="
          echo "The app may take a few minutes to fully start."
          echo "Monitor at: https://taktiq-web-frontend.scm.azurewebsites.net/api/deployments"
          echo "App URL: https://taktiq-web-frontend.azurewebsites.net"

          # Give it some time to start
          echo "Waiting 60 seconds for initial startup..."
          sleep 60

          # Try to check app status (non-blocking)
          az webapp show \
            --resource-group taktiqRecursos \
            --name taktiq-web-frontend \
            --query "state" -o tsv || echo "Could not check app state"

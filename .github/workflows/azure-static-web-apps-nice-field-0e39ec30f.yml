name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      # 1. Instalar o pnpm e o Node.js
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'pnpm' 
          # --- CORREÇÃO AQUI ---
          # Dizemos explicitamente ao GitHub onde está o lockfile
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      # 2. Instalar dependências e Build (Executado na pasta raiz do frontend)
      - name: Install Dependencies and Build Frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build:web # Cria a pasta frontend/apps/web/out

      # 3. Deploy para a Static Web App
      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Use o seu segredo real aqui
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_FIELD_0E39EC30F }} 
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # --- CORREÇÃO FINAL AQUI ---
          # 1. app_location: Diz onde está o código-fonte (a pasta 'frontend')
          app_location: "frontend" 
          
          # 2. output_location: Diz onde a pasta 'out' foi gerada (relativo à pasta frontend)
          output_location: "apps/web/out" 
          
          # Diz à Azure para não tentar fazer o build
          skip_app_build: true
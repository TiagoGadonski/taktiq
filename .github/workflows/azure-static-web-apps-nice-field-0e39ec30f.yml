name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      # 1. Setup pnpm (Mantido)
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 2. Deploy para a Static Web App (Com o comando correto)
      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_FIELD_0E39EC30F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # 1. app_location: Diz onde está o código-fonte (a pasta 'frontend')
          app_location: "frontend/apps/web" 
          
          # 2. output_location: Diz onde está o resultado FINAL (relativo ao app_location)
          output_location: "out" 
          
          # 3. COMANDO DE BUILD CORRIGIDO
          # O build deve usar o pnpm, que é injetado no comando de build.
          app_build_command: "pnpm install && pnpm run build"
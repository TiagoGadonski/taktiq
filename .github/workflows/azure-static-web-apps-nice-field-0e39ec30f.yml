name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ main ]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      # instala deps na raiz do workspace (onde está pnpm-workspace.yaml e o lockfile)
      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # builda o Next (SSR), sem export
      - name: Build Web App
        run: pnpm run build:web
        working-directory: frontend

      # deploy SSR com SWA CLI (sem Oryx)
      - name: Deploy (SWA CLI)
        run: |
          pnpm dlx @azure/static-web-apps-cli@latest deploy \
            --app-location "frontend/apps/web" \
            --deployment-token "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_FIELD_0E39EC30F }}" \
            --env production \
            --api-language node \
            --api-version 20 \
            --verbose
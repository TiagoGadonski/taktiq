name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      # 1. Instalar o pnpm e o Node.js
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'

      # 2. Instalar dependências e Build (Executado na pasta raiz do frontend)
      - name: Install Dependencies and Build Frontend
        working-directory: frontend # Executa os comandos dentro da pasta 'frontend'
        run: |
          pnpm install --frozen-lockfile
          # O build:web que você tem no seu package.json cria a pasta 'out'
          pnpm run build:web

      # 3. Deploy para a Static Web App
      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Use o seu segredo completo aqui
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_FIELD_0E39EC30F }} 
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # --- CAMINHOS CORRIGIDOS ---
          # app_location: A raiz do código-fonte (frontend)
          app_location: "frontend" 
          
          # output_location: A pasta 'out' gerada pelo seu 'next build' (relativa ao app_location)
          output_location: "apps/web/out"
          
          # Desativar o build interno da Azure (Oryx) para usar o nosso build do pnpm
          skip_app_build: true
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - taktiq-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build src/GymHero.Api/GymHero.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish src/GymHero.Api/GymHero.Api.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./api-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_520E67CD709C4C2D856381047B8F6CC2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBA37EC361994F1888857F18897FE10B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3F7A8C19EE0146BF9CBF9722FD32EBFB }}

      - name: Create deployment package
        run: |
          cd api-app
          zip -r ../deploy.zip .
          cd ..
          echo "== Deployment package contents (first 50 lines) =="
          unzip -l deploy.zip | head -50

      - name: Configure Azure for run-from-package
        run: |
          echo "Stopping API for clean configuration..."
          az webapp stop --resource-group taktiqRecursos --name taktiq-api

          echo "Removing WEBSITE_RUN_FROM_PACKAGE (reverting to standard deployment)..."
          az webapp config appsettings delete \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --setting-names WEBSITE_RUN_FROM_PACKAGE SCM_DO_BUILD_DURING_DEPLOYMENT \
            --output none || true

          echo "Setting startup command to prevent Oryx script generation..."
          az webapp config set \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --startup-file "exec dotnet GymHero.Api.dll"

      - name: Deploy using config-zip (no build triggering)
        run: |
          echo "Deploying with config-zip method (simplest, no Oryx)..."
          az webapp deployment source config-zip \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --src deploy.zip

          echo "Deployment completed"

      - name: Start API after deployment
        run: |
          echo "Starting API..."
          az webapp start \
            --resource-group taktiqRecursos \
            --name taktiq-api

          echo "API started"

      - name: Wait for startup
        run: |
          echo "Waiting 90 seconds for API to start..."
          sleep 90

      - name: Check deployment status
        run: |
          echo "=== Checking API status ==="
          az webapp show \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --query "state" -o tsv

          echo ""
          echo "Monitor logs at: https://taktiq-api.scm.azurewebsites.net/api/logs/docker"
          echo "API Health URL: https://api.taktiq.app/api/health"

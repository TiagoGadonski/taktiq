# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - taktiq-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build src/GymHero.Api/GymHero.Api.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish src/GymHero.Api/GymHero.Api.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./api-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_520E67CD709C4C2D856381047B8F6CC2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBA37EC361994F1888857F18897FE10B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3F7A8C19EE0146BF9CBF9722FD32EBFB }}

      - name: Create deployment package
        run: |
          cd api-app
          zip -r ../deploy.zip .
          cd ..
          echo "== Deployment package contents (first 50 lines) =="
          unzip -l deploy.zip | head -50

      - name: Stop the API before deployment
        run: |
          echo "Stopping API to ensure clean deployment..."
          az webapp stop --resource-group taktiqRecursos --name taktiq-api

      - name: Disable Oryx build detection
        run: |
          echo "Disabling Oryx build/startup detection to prevent double-startup..."
          az webapp config appsettings set \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false \
            --output none

          echo "Clearing startup command..."
          az webapp config set \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --startup-file ""

          echo "Verifying configuration..."
          az webapp config appsettings list \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --query "[?name=='SCM_DO_BUILD_DURING_DEPLOYMENT'].value" -o tsv

      - name: Deploy to Azure Web App (ZIP)
        run: |
          echo "Starting deployment..."
          az webapp deploy \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --src-path deploy.zip \
            --type zip \
            --clean true \
            --restart true \
            --timeout 300

          echo "Deployment completed"

      - name: Wait for startup
        run: |
          echo "Waiting 90 seconds for API to start..."
          sleep 90

      - name: Check deployment status
        run: |
          echo "=== Checking API status ==="
          az webapp show \
            --resource-group taktiqRecursos \
            --name taktiq-api \
            --query "state" -o tsv

          echo ""
          echo "Monitor logs at: https://taktiq-api.scm.azurewebsites.net/api/logs/docker"
          echo "API Health URL: https://api.taktiq.app/api/health"

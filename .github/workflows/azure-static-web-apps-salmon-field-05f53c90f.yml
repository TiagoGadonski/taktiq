name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      # ==== BUILD (fora do Oryx; usa pnpm + turbo ou build direto) ====
      - name: Install & Build (direct in app)
        run: |
          set -euxo pipefail
          cd frontend
          pnpm install --frozen-lockfile
          # garante upstreams antes, se necessário
          pnpm turbo run build --filter='@gymhero/shared' || true
          # build direto no app web (Next.js)
          cd apps/web
          pnpm run build

      # ==== CHECAGEM: a pasta .next precisa existir ====
      - name: Verify Next build output
        run: |
          set -euxo pipefail
          ls -la frontend/apps/web || true
          ls -la frontend/apps/web/.next || true
          test -d frontend/apps/web/.next

      # ==== DEPLOY (sem build dentro do container do Azure) agora vai ====
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_05F53C90F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/apps/web
          output_location: .next
          skip_app_build: true

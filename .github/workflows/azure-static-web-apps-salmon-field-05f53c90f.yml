name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4 # A versão do seu package.json

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      # --- ESTES SÃO OS PASSOS CORRIGIDOS ---

      - name: Install Dependencies
        run: |
          cd frontend
          pnpm install
        
      - name: Build Frontend
        run: |
          cd frontend
          pnpm run build:web

      # --- FIM DAS CORREÇÕES ---

      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_... }} # Use o seu segredo real aqui
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # Caminho para a raiz do seu monorepo frontend
          app_location: "frontend"
          
          # Caminho para a pasta de saída do Next.js (relativo ao app_location)
          output_location: "apps/web/out"

  close_pull_request_job:
    # ... (esta parte fica igual)
name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      # --- INÍCIO DAS NOVAS ALTERAÇÕES ---

      - name: Install Dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile
        
      - name: Build Web App
        run: |
          # 1. Navega para a pasta da app específica
          cd frontend/apps/web
          # 2. Executa o build (que é 'next build') diretamente
          pnpm run build

      # --- FIM DAS NOVAS ALTERAÇÕES ---

      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_05F53C90F }} 
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # Aponte para a pasta 'out' (o build do Next.js com 'output: export' irá criá-la)
          app_location: "frontend/apps/web/out" 
          
          # Diz à Azure para NÃO tentar fazer o build
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_FIELD_05F53C90F }}
          action: "close"